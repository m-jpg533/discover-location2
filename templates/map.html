
<!DOCTYPE html>
<html>
<head>
  <title>Google 地圖定位</title>
  <style>
    #map { height: 100vh; width: 100%; }
  </style>
</head>
<body>

<div id="map"></div>

<script>
let map;
let marker;

function initMap() {
  map = new google.maps.Map(document.getElementById("map"), {
    zoom: 16,
    center: { lat: 25.033, lng: 121.5654 }
  });

  if (navigator.geolocation) {
    navigator.geolocation.watchPosition(position => {
      const pos = {
        lat: position.coords.latitude,
        lng: position.coords.longitude
      };

      map.setCenter(pos);

      if (marker) {
        marker.setPosition(pos);
      } else {
        marker = new google.maps.Marker({
          position: pos,
          map: map
        });
      }

      // 🔥 傳回 Flask
      fetch("/save-location", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify(pos)
      });

    });
  }
}
</script>

<!-- ⚠️ 換成你的 API KEY -->
<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyClqtKjECMTCmQX-MDKJnZ9f9zQELKhTME&callback=initMap" async defer></script>

</body>
</html>
